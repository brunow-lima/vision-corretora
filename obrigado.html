                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],

            color: #ffffff;

        }
        .glass-panel {

            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .btn-green {

            color: #fff;
        }
        .btn-green:hover {
